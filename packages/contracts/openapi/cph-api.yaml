openapi: 3.1.0
info:
  title: CPH API
  version: 0.1.0
paths:
  /api/v1/auth/invite:
    post:
      summary: Invite a user
      responses:
        "200":
          description: Invite queued
  /api/v1/me:
    get:
      summary: Current user profile
      responses:
        "200":
          description: Profile details
  /api/v1/review-cycles:
    post:
      summary: Create review cycle
      responses:
        "200":
          description: Created
  /api/v1/feedback/company-anonymous:
    post:
      summary: Submit anonymous company feedback
      responses:
        "200":
          description: Accepted
